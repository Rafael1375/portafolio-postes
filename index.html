<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio de Proyectos Luminosos</title>

<style>
body {
    margin: 0;
    font-family: 'Segoe UI', sans-serif;
    background: #0f172a;
    color: white;
}

header {
    background: linear-gradient(90deg, #0d47a1, #1976d2);
    padding: 20px;
    text-align: center;
}

header h1 {
    margin: 0;
    font-size: 22px;
}

header p {
    margin-top: 5px;
    font-size: 13px;
    color: #cbd5e1;
}

.contenedor {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(220px, 1fr));
    gap: 25px;
    padding: 30px;
    justify-items: center;
}

.card {
    background: #1e293b;
    border-radius: 15px;
    padding: 15px;
    width: 100%;
    max-width: 260px;
    box-shadow: 0 8px 20px rgba(0,0,0,0.4);
    transition: 0.3s;
    text-align: center;
}

.card:hover {
    transform: translateY(-5px);
}

/* PROPORCIÓN VERTICAL 9:16 */
.video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    background: black;
    border-radius: 12px;
    overflow: hidden;
}

.video-wrapper iframe {
    width: 100%;
    height: 100%;
}

.card h2 {
    margin-top: 10px;
    font-size: 14px;
    color: #38bdf8;
}

.card p {
    font-size: 12px;
    color: #cbd5e1;
}
</style>
</head>

<body>

<header>
    <h1>Portafolio de Proyectos Luminosos</h1>
    <p>Visualización real de shows implementados en postes luminosos</p>
</header>

<div class="contenedor">

    <!-- SHOW 1 -->
    <div class="card">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/B_4XJsanIrw"
                title="Ciclon Meteorito"
                frameborder="0"
                allow="accelerometer; autoplay; clipboard-write; encrypted-media; gyroscope; picture-in-picture"
                allowfullscreen>
            </iframe>
        </div>
        <h2>Show 1 - Ciclon Meteorito</h2>
        <p>Visualización real del efecto luminoso.</p>
    </div>

    <!-- ESPACIO PARA LOS OTROS 22 SHOWS -->
    <!--
    <div class="card">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube.com/embed/ID_DEL_VIDEO"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        <h2>Show 2 - Nombre del Show</h2>
        <p>Descripción breve.</p>
    </div>
    -->

</div>

</body>
</html>

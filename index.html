<!DOCTYPE html>
<html lang="es">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Portafolio Técnico - Proyectos Luminosos</title>

<style>
body {
    margin: 0;
    font-family: Arial, Helvetica, sans-serif;
    background: #0b1120;
    color: #e5e7eb;
}

header {
    padding: 40px 20px;
    text-align: center;
    background: #111827;
    border-bottom: 1px solid #1f2937;
}

header h1 {
    margin: 0;
    font-size: 26px;
    letter-spacing: 1px;
}

header p {
    margin-top: 8px;
    font-size: 14px;
    color: #9ca3af;
}

.contenedor {
    display: grid;
    grid-template-columns: repeat(auto-fit, minmax(260px, 1fr));
    gap: 40px;
    padding: 50px 40px;
    max-width: 1200px;
    margin: auto;
}

.card {
    background: #111827;
    border: 1px solid #1f2937;
    border-radius: 14px;
    padding: 20px;
    text-align: center;
    transition: 0.3s ease;
}

.card:hover {
    border-color: #2563eb;
    transform: translateY(-6px);
}

.video-wrapper {
    position: relative;
    width: 100%;
    aspect-ratio: 9 / 16;
    background: black;
    border-radius: 10px;
    overflow: hidden;
}

.video-wrapper iframe {
    width: 100%;
    height: 100%;
}

.card h2 {
    margin-top: 18px;
    font-size: 15px;
    font-weight: 600;
    letter-spacing: 0.5px;
}

.card p {
    font-size: 13px;
    color: #9ca3af;
    margin-top: 6px;
}

footer {
    text-align: center;
    padding: 30px;
    font-size: 12px;
    color: #6b7280;
    border-top: 1px solid #1f2937;
}
</style>
</head>

<body>

<header>
    <h1>PORTAFOLIO DE PROYECTOS LUMINOSOS</h1>
    <p>Visualización técnica de shows implementados en postes LED programables</p>
</header>

<div class="contenedor">

    <!-- SHOW 1 -->
    <div class="card">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/B_4XJsanIrw?rel=0&modestbranding=1"
                title="Ciclon Meteorito"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        <h2>SHOW 01 · CICLÓN METEORITO</h2>
        <p>Secuencia dinámica LED RGB programada para estructuras verticales.</p>
    </div>

    <!-- COPIA ESTE BLOQUE PARA LOS OTROS 22 SHOWS -->

    <div class="card">
        <div class="video-wrapper">
            <iframe 
                src="https://www.youtube-nocookie.com/embed/ID_DEL_VIDEO?rel=0&modestbranding=1"
                frameborder="0"
                allowfullscreen>
            </iframe>
        </div>
        <h2>SHOW 02 · NOMBRE DEL SHOW</h2>
        <p>Descripción técnica breve del efecto.</p>
    </div>
    -->

</div>

<footer>
    © 2025 Portafolio Técnico · Proyectos Luminosos LED
</footer>

</body>
</html>
